<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow:hover { box-shadow: 0 0 20px rgba(34, 211, 238, 0.2); border-color: rgba(34, 211, 238, 0.5); }
    </style>
</head>
<body x-data="{ items: [], lastUpdate: '', search: '', tab: 'Fruits' }" x-init="fetch('./data.json').then(r => r.json()).then(d => { items = d.categories; lastUpdate = d.last_updated; })">

    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="text-center mb-16">
            <h1 class="text-6xl font-black tracking-tighter bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
                SAILOR VALUES
            </h1>
            <p class="text-gray-500 mt-4 uppercase tracking-widest text-sm">Last Synced: <span x-text="lastUpdate"></span></p>
        </header>

        <div class="flex flex-col md:flex-row justify-between gap-4 mb-8">
            <div class="flex gap-2 p-1 bg-white/5 rounded-2xl border border-white/10">
                <template x-for="t in ['Fruits', 'Gamepass', 'Items', 'Swords']">
                    <button @click="tab = t" :class="tab === t ? 'bg-cyan-500 text-black' : 'text-white hover:bg-white/5'" 
                            class="px-6 py-2 rounded-xl font-bold transition-all" x-text="t"></button>
                </template>
            </div>
            <input type="text" x-model="search" placeholder="Search item..." 
                   class="glass px-6 py-3 rounded-2xl outline-none focus:ring-2 ring-cyan-500 w-full md:w-64">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="item in items[tab]?.filter(i => i.name.toLowerCase().includes(search.toLowerCase()))">
                <div class="glass p-6 rounded-3xl glow transition-all duration-300 transform hover:-translate-y-2">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-bold uppercase py-1 px-3 bg-white/10 rounded-full text-gray-400" x-text="tab"></span>
                        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    </div>
                    <h3 class="text-2xl font-bold mb-1" x-text="item.name"></h3>
                    <p class="text-cyan-400 text-3xl font-black font-mono" x-text="item.value"></p>
                </div>
            </template>
        </div>
    </div>
</body>
</html>
