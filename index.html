<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sailor Piece Value List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #0a0a0a; color: #ffffff; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); 
        }
    </style>
</head>
<body x-data="{ items: {}, update: 'Loading...', tab: 'Fruits' }" 
      x-init="fetch('./data.json').then(r => r.json()).then(d => { items = d.categories; update = d.last_updated })"
      class="antialiased min-h-screen">

    <div class="max-w-4xl mx-auto px-4 py-10" x-cloak>
        <header class="mb-10 text-center">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">
                SAILOR VALUES
            </h1>
            <p class="text-gray-500 font-medium">Terakhir Update: <span class="text-gray-300" x-text="update"></span></p>
        </header>

        <div class="flex flex-wrap justify-center gap-3 mb-10">
            <template x-for="t in ['Fruits', 'Gamepass', 'Items']">
                <button @click="tab = t" 
                        :class="tab === t ? 'bg-cyan-500 shadow-[0_0_15px_rgba(6,182,212,0.5)]' : 'bg-zinc-900 text-gray-400'"
                        class="px-8 py-3 rounded-xl font-bold transition-all duration-300" 
                        x-text="t">
                </button>
            </template>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <template x-for="item in items[tab]" :key="item.name">
                <div class="glass-card p-5 rounded-2xl flex justify-between items-center group hover:border-cyan-500/50 transition-all">
                    <div>
                        <p class="text-xs text-cyan-500 font-bold mb-1 opacity-60" x-text="tab"></p>
                        <h3 class="text-lg font-bold text-white group-hover:text-cyan-400 transition-colors" x-text="item.name"></h3>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-mono font-bold text-cyan-400" x-text="item.value"></p>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="!items[tab] || items[tab].length === 0" class="text-center py-20">
            <p class="text-gray-600 italic">Data sedang dimuat atau kategori kosong...</p>
        </div>
    </div>

</body>
</html>
