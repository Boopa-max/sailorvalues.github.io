<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sailor Piece Values | Official Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0b0f; --sidebar: #111116; --card: #16161d; --border: #26262f; --accent: #3b82f6; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar { width: 280px; height: 100vh; background: var(--sidebar); border-right: 1px solid var(--border); position: fixed; left: 0; top: 0; z-index: 50; padding: 2rem 1.5rem; }
        .main-content { margin-left: 280px; padding: 2.5rem; }
        .item-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; transition: 0.3s; position: relative; overflow: hidden; }
        .item-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3); }
        .calc-panel { background: #111116; border: 1px solid var(--border); border-radius: 24px; padding: 2rem; margin-bottom: 3rem; }
        .tag { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        .tag-mythical { background: rgba(236, 72, 153, 0.1); color: #ec4899; }
        .tag-secret { background: rgba(168, 85, 247, 0.1); color: #a855f7; }
        @media (max-width: 1024px) { .sidebar { display: none; } .main-content { margin-left: 0; padding: 1.5rem; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="flex items-center gap-3 mb-12">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black italic text-xl">S</div>
            <h1 class="font-extrabold text-lg uppercase tracking-tighter text-white">Sailor<span class="text-blue-500">Values</span></h1>
        </div>
        <nav class="space-y-1">
            <button onclick="filterType('all')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 transition font-semibold text-sm">🏠 Dashboard</button>
            <button onclick="filterType('Weapon')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 transition font-semibold text-sm">⚔️ Swords</button>
            <button onclick="filterType('Accessory')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 transition font-semibold text-sm">🧥 Accessories</button>
            <button onclick="filterType('Fruit')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 transition font-semibold text-sm">🍍 Fruits</button>
        </nav>
    </aside>

    <main class="main-content">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <h2 class="text-4xl font-black tracking-tighter uppercase italic text-white">Live <span class="text-blue-500 text-3xl">Analytics</span></h2>
            <input type="text" id="search" onkeyup="search()" placeholder="Search item..." class="w-full md:w-96 bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-blue-500 transition">
        </header>

        <section class="calc-panel">
            <h3 class="font-extrabold uppercase italic tracking-wider mb-6 text-blue-500 text-sm">Trade Calculator</h3>
            <div class="grid grid-cols-2 gap-8">
                <div class="text-center"><p class="text-[10px] font-bold text-gray-500 mb-2">YOUR SIDE</p><span id="your-total" class="font-black text-2xl text-white">0 CR</span></div>
                <div class="text-center"><p class="text-[10px] font-bold text-gray-500 mb-2">THEIR SIDE</p><span id="their-total" class="font-black text-2xl text-red-500">0 CR</span></div>
            </div>
            <div id="calc-status" class="mt-6 text-center py-3 bg-white/5 rounded-xl font-black text-xs uppercase tracking-widest text-gray-500">Awaiting Data...</div>
        </section>

        <div id="item-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <script>
        const database = [
            { name: "Atomic Sword", price: 1350000, rarity: "Mythical", demand: "🔥 High", type: "Weapon", icon: "☢️" },
            { name: "Ice Queen Sword", price: 1100000, rarity: "Mythical", demand: "🔥 High", type: "Weapon", icon: "❄️" },
            { name: "Abyssal Empress", price: 1050000, rarity: "Mythical", demand: "Stable", type: "Weapon", icon: "🔱" },
            { name: "Aura Crate", price: 485, rarity: "Secret", demand: "📈 Extreme", type: "Material", icon: "✨" },
            { name: "Ice Queen Outfit", price: 185, rarity: "Mythical", demand: "Low", type: "Accessory", icon: "👑" },
            { name: "Moon Outfit", price: 65, rarity: "Mythical", demand: "Very Low", type: "Accessory", icon: "🌙" },
            { name: "Light Fruit", price: 22, rarity: "Legendary", demand: "Medium", type: "Fruit", icon: "☀️" },
            { name: "Abyss Sigil", price: 7, rarity: "Legendary", demand: "High", type: "Material", icon: "🌀" }
        ];

        let ySum = 0, tSum = 0;

        function render(data) {
            document.getElementById('item-grid').innerHTML = data.map(i => `
                <div class="item-card p-6">
                    <div class="flex justify-between items-start mb-4">
                        <span class="tag tag-${i.rarity.toLowerCase()}">${i.rarity}</span>
                        <div class="flex gap-2">
                            <button onclick="calc('y',${i.price})" class="w-7 h-7 bg-green-500/10 text-green-500 rounded font-bold text-[10px] hover:bg-green-500 hover:text-white transition">Y</button>
                            <button onclick="calc('t',${i.price})" class="w-7 h-7 bg-red-500/10 text-red-500 rounded font-bold text-[10px] hover:bg-red-600 hover:text-white transition">T</button>
                        </div>
                    </div>
                    <div class="text-center pb-4">
                        <div class="text-4xl mb-4">${i.icon}</div>
                        <h4 class="font-extrabold text-sm uppercase tracking-tight">${i.name}</h4>
                        <p class="text-blue-500 font-black text-lg">${i.price.toLocaleString()} CR</p>
                    </div>
                </div>
            `).join('');
        }

        function calc(side, p) {
            if(side === 'y') ySum += p; else tSum += p;
            document.getElementById('your-total').innerText = ySum.toLocaleString() + " CR";
            document.getElementById('their-total').innerText = tSum.toLocaleString() + " CR";
            const diff = ySum - tSum;
            const s = document.getElementById('calc-status');
            if(diff > 0) { s.innerText = "L - OVERPAYING"; s.style.color = "#ef4444"; }
            else if(diff < 0) { s.innerText = "W - MASSIVE WIN"; s.style.color = "#22c55e"; }
            else { s.innerText = "FAIR TRADE"; s.style.color = "#3b82f6"; }
        }

        function search() {
            const q = document.getElementById('search').value.toLowerCase();
            render(database.filter(i => i.name.toLowerCase().includes(q)));
        }

        function filterType(type) {
            if(type === 'all') render(database);
            else render(database.filter(i => i.type === type));
        }

        render(database);
    </script>
</body>
</html>
