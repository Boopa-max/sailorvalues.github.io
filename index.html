<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sailor Piece | Values & Assets</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --card: rgba(20, 24, 33, 0.9);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #6366f1;
            --border: rgba(255, 255, 255, 0.08);
            --green: #10b981;
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --card: #f8fafc;
            --text: #0f172a;
            --text-dim: #64748b;
            --accent: #4f46e5;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.2s; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        header {
            padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;
            background: var(--card); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -1px; }

        /* --- CATEGORY TABS --- */
        .category-nav { padding: 1.5rem 2rem; display: flex; gap: 10px; border-bottom: 1px solid var(--border); }
        .tab-btn { padding: 8px 20px; border-radius: 30px; border: 1px solid var(--border); background: var(--card); color: var(--text-dim); cursor: pointer; font-weight: 700; font-size: 12px; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* --- SEARCH --- */
        .search-container { padding: 1.5rem 2rem; }
        .search-bar { width: 100%; max-width: 400px; padding: 12px 20px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); color: var(--text); font-weight: 600; outline: none; }

        /* --- GRID & CARDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; padding: 2rem; }
        .card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        
        .img-box { 
            height: 220px; width: 100%; 
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.05); padding: 20px;
        }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); }

        .content { padding: 1.5rem; }
        .tag { font-size: 10px; font-weight: 900; color: var(--accent); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .price { font-size: 1.6rem; font-weight: 900; color: var(--green); margin-top: 10px; }

        /* --- THEME TOGGLE --- */
        .theme-toggle { position: fixed; bottom: 25px; left: 25px; width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: white; border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 1000; font-size: 20px; }
    </style>
</head>
<body data-theme="dark">

    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <header>
        <div class="logo">Sailor <span style="color:var(--accent)">Piece Value</span></div>
        <button onclick="adminLogin()" style="background:none; border:none; color:var(--text-dim); font-weight:bold; cursor:pointer;">OWNER</button>
    </header>

    <div class="category-nav">
        <button class="tab-btn active" onclick="switchFilter('ALL', this)">ALL ITEMS</button>
        <button class="tab-btn" onclick="switchFilter('SWORD', this)">SWORDS</button>
        <button class="tab-btn" onclick="switchFilter('ACCESSORY', this)">ACCESSORIES</button>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" id="searchBox" placeholder="Search item list...">
    </div>

    <div class="grid" id="mainGrid"></div>

    <script>
        const PASS = "boopapengu";
        
        // Use a generic image placeholder if real URL fails
        const placeholder = "https://via.placeholder.com/300x300?text=Boopa+Piece+Item";

        // --- THE LIST DATA ---
        let items = [
            { id: 1, name: "Atomic Sword", type: "SWORD", val: "1,086", img: "https://www.roblox.com/asset-thumbnail/image?assetId=12247192667&width=420&height=420&format=png" },
            { id: 2, name: "Ragna Set", type: "ACCESSORY", val: "1,650,000", img: "https://www.roblox.com/asset-thumbnail/image?assetId=12247201886&width=420&height=420&format=png" },
            { id: 3, name: "Saber v2", type: "SWORD", val: "2,184", img: "https://www.roblox.com/asset-thumbnail/image?assetId=12247194639&width=420&height=420&format=png" },
            { id: 4, name: "Madoka Set", type: "ACCESSORY", val: "835,000", img: "https://www.roblox.com/asset-thumbnail/image?assetId=12247201111&width=420&height=420&format=png" },
            { id: 5, name: "Abyssal Empress", type: "SWORD", val: "4,000", img: "https://www.roblox.com/asset-thumbnail/image?assetId=12247192668&width=420&height=420&format=png" }
        ];

        let activeCategory = 'ALL';

        function render() {
            const grid = document.getElementById('mainGrid');
            const search = document.getElementById('searchBox').value.toLowerCase();
            grid.innerHTML = '';

            const filtered = items.filter(i => {
                const cMatch = activeCategory === 'ALL' || i.type === activeCategory;
                const sMatch = i.name.toLowerCase().includes(search);
                return cMatch && sMatch;
            });

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="img-box">
                        <img src="${item.img}" onerror="this.src='${placeholder}'" alt="${item.name}">
                    </div>
                    <div class="content">
                        <span class="tag">${item.type}</span>
                        <h2 style="font-size: 1.1rem; margin: 5px 0;">${item.name}</h2>
                        <div class="price">${item.val}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function switchFilter(cat, btn) {
            activeCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function adminLogin() {
            const p = prompt("Admin Password:");
            if(p === PASS) alert("Login Success! You can now edit the code to add more items.");
        }

        document.getElementById('searchBox').oninput = render;
        render();
    </script>
</body>
</html>
