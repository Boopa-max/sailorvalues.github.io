<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sailor Piece Values | Official Trading Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Poppins', sans-serif; }
        .bf-card { background: #111; border: 1px solid #222; border-radius: 12px; transition: 0.2s; cursor: pointer; }
        .bf-card:hover { border-color: #3b82f6; transform: translateY(-3px); }
        .rarity-secret { color: #a855f7; }
        .rarity-mythical { color: #ec4899; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 100; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4">

    <nav class="max-w-6xl mx-auto flex justify-between items-center p-4 border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded font-bold flex items-center justify-center italic text-lg">S</div>
            <span class="font-black text-xl tracking-tighter uppercase">Sailor <span class="text-blue-500">Values</span></span>
        </div>
        <input type="text" id="search" onkeyup="filterItems()" placeholder="Search..." class="bg-white/5 border border-white/10 rounded-full px-4 py-1 text-sm outline-none focus:border-blue-500">
    </nav>

    <div class="max-w-6xl mx-auto mt-6 bg-blue-600/10 border border-blue-500/30 p-4 rounded-xl text-center">
        <p class="text-xs font-bold text-blue-400 uppercase">April 18, 2026: Aura Crates are now 450-500 CR! Fruits/Accessories values dropped.</p>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mt-8" id="grid"></div>

    <div id="modal" onclick="this.style.display='none'">
        <div class="bg-gray-900 p-8 rounded-3xl border border-gray-800 w-full max-w-sm" onclick="event.stopPropagation()">
            <h2 id="m-name" class="text-2xl font-black italic mb-4">ITEM</h2>
            <div class="space-y-3">
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="text-gray-500 text-sm">Value</span>
                    <span id="m-price" class="font-bold text-blue-400 mono">---</span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="text-gray-500 text-sm">Demand</span>
                    <span id="m-demand" class="font-bold">---</span>
                </div>
                <p id="m-note" class="text-[10px] text-gray-500 italic mt-4"></p>
            </div>
            <button onclick="document.getElementById('modal').style.display='none'" class="w-full mt-6 bg-white text-black font-bold py-2 rounded-lg text-sm">Close</button>
        </div>
    </div>

    <script>
        const database = [
            { name: "Aura Crate", price: "450-500", rarity: "Secret", demand: "EXTREME", type: "Currency", icon: "✨", note: "Top tier currency. Huge price jump recently." },
            { name: "Atomic Sword", price: "1.2M+", rarity: "Mythical", demand: "HIGH", type: "Weapon", icon: "☢️", note: "Hardest endgame weapon to trade for." },
            { name: "Moon Outfit", price: "40-60", rarity: "Mythical", demand: "LOW", type: "Accessory", icon: "🌙", note: "Farmable. Values have dropped significantly." },
            { name: "Light Fruit", price: "15-20", rarity: "Legendary", demand: "MEDIUM", type: "Fruit", icon: "☀️", note: "Standard add-on for trades." },
            { name: "Abyss Sigil", price: "5-8", rarity: "Legendary", demand: "HIGH", type: "Material", icon: "🌀", note: "Very easy to trade for small amounts of CR." }
        ];

        function render(data) {
            document.getElementById('grid').innerHTML = data.map(i => `
                <div class="bf-card p-4" onclick="openModal('${i.name}')">
                    <div class="flex justify-between text-[9px] font-bold mb-2">
                        <span class="rarity-${i.rarity.toLowerCase()} uppercase">${i.rarity}</span>
                        <span class="text-gray-500">${i.demand}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="text-2xl">${i.icon}</div>
                        <div>
                            <h3 class="font-bold text-sm">${i.name}</h3>
                            <p class="text-blue-500 font-bold mono text-xs">${i.price} CR</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(name) {
            const item = database.find(i => i.name === name);
            document.getElementById('m-name').innerText = item.name.toUpperCase();
            document.getElementById('m-price').innerText = item.price + " CR";
            document.getElementById('m-demand').innerText = item.demand;
            document.getElementById('m-note').innerText = item.note;
            document.getElementById('modal').style.display = 'flex';
        }

        function filterItems() {
            const q = document.getElementById('search').value.toLowerCase();
            render(database.filter(i => i.name.toLowerCase().includes(q)));
        }

        render(database);
    </script>
</body>
</html>
