<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <template x-for="item in items[tab]">
        <div class="glass p-4 rounded-2xl flex justify-between items-center hover:scale-105 transition-transform">
            <div class="flex flex-col">
                <span class="text-sm text-gray-400 uppercase tracking-widest" x-text="tab"></span>
                <span class="text-lg font-bold text-white" x-text="item.name"></span>
            </div>
            <div class="text-right">
                <span class="text-cyan-400 font-mono font-bold text-lg" x-text="item.value"></span>
            </div>
        </div>
    </template>
</div>
