<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sailor Piece Value List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-glow:hover { border-color: #22d3ee; box-shadow: 0 0 20px rgba(34, 211, 238, 0.2); transform: translateY(-5px); }
    </style>
</head>
<body x-data="{ data: null, tab: 'Fruits', search: '' }" 
      x-init="fetch('./data.json').then(res => res.json()).then(json => data = json)">

    <div class="max-w-6xl mx-auto px-6 py-12">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-black tracking-tighter bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent italic">
                SAILOR PIECE VALUES
            </h1>
            <p class="text-gray-500 mt-2 text-sm uppercase tracking-widest">
                Last Update: <span x-text="data ? data.last_updated : 'Loading...'"></span>
            </p>
        </div>

        <div class="flex flex-col md:flex-row gap-4 mb-10 justify-between">
            <div class="flex p-1 glass rounded-2xl">
                <template x-for="t in ['Fruits', 'Gamepass', 'Items', 'Swords']">
                    <button @click="tab = t" 
                            :class="tab === t ? 'bg-cyan-500 text-black shadow-lg shadow-cyan-500/50' : 'text-gray-400 hover:text-white'"
                            class="px-6 py-2 rounded-xl font-bold transition-all duration-300" 
                            x-text="t"></button>
                </template>
            </div>
            <input type="text" x-model="search" placeholder="Search item..." 
                   class="glass px-6 py-3 rounded-2xl outline-none focus:ring-2 ring-cyan-500 w-full md:w-64">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" x-cloak>
            <template x-if="data">
                <template x-for="item in data.categories[tab].filter(i => i.name.toLowerCase().includes(search.toLowerCase()))">
                    <div class="glass p-6 rounded-3xl card-glow transition-all duration-300">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] font-bold uppercase py-1 px-3 bg-cyan-500/20 text-cyan-400 rounded-full" x-text="tab"></span>
                            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_10px_#22c55e]"></div>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-2" x-text="item.name"></h3>
                        <div class="text-3xl font-black text-cyan-400 font-mono tracking-tight" x-text="item.value"></div>
                    </div>
                </template>
            </template>
        </div>
    </div>
</body>
</html>
