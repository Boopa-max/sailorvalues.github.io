<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boopa Analytics | Sailor Piece Values</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --card: rgba(20, 24, 33, 0.9);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #6366f1;
            --border: rgba(255, 255, 255, 0.08);
            --green: #10b981;
        }

        [data-theme="light"] {
            --bg: #f1f5f9;
            --card: rgba(255, 255, 255, 0.95);
            --text: #0f172a;
            --text-dim: #64748b;
            --accent: #4f46e5;
            --border: rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; }

        header {
            padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;
            background: var(--card); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -1px; }

        /* Controls */
        .controls { padding: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .search-input { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 12px 20px; border-radius: 12px; width: 300px; outline: none; }
        .filter-btns { display: flex; gap: 0.5rem; }
        .btn { padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text-dim); cursor: pointer; font-weight: 600; }
        .btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; padding: 0 2rem 2rem; }
        .card { 
            background: var(--card); border-radius: 20px; border: 1px solid var(--border); 
            overflow: hidden; position: relative; animation: popIn 0.5s ease;
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .item-img { 
            height: 200px; width: 100%; 
            background-size: contain; background-repeat: no-repeat; background-position: center; 
            background-color: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border);
        }
        .content { padding: 1.5rem; }
        .category-tag { font-size: 10px; font-weight: 900; color: var(--accent); margin-bottom: 5px; display: block; }
        .val { font-size: 1.4rem; font-weight: 900; color: var(--green); }

        /* Admin UI */
        .admin-panel { display: none; margin: 0 2rem 2rem; padding: 1.5rem; border: 2px dashed var(--accent); border-radius: 15px; background: var(--card); }
        
        .theme-btn { position: fixed; bottom: 20px; left: 20px; padding: 12px; border-radius: 50%; width: 50px; height: 50px; background: var(--accent); color: white; border: none; cursor: pointer; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body data-theme="dark">

    <button class="theme-btn" onclick="toggleTheme()">🌓</button>

    <header>
        <div class="logo">BOOPA <span style="color:var(--accent)">ANALYSIS</span></div>
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="showLogin()" style="font-size:11px;">OWNER LOGIN</button>
        </div>
    </header>

    <div class="controls">
        <input type="text" class="search-input" id="search" placeholder="Search weapons/armor...">
        <div class="filter-btns">
            <button class="btn active" onclick="setFilter('ALL', this)">ALL</button>
            <button class="btn" onclick="setFilter('SWORD', this)">SWORDS</button>
            <button class="btn" onclick="setFilter('ACCESSORY', this)">ACCESSORIES</button>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <h3 style="margin-bottom:1rem;">Add New Asset</h3>
        <form id="addForm" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:10px;">
            <input type="text" id="addName" placeholder="Name" required class="search-input" style="width:100%">
            <input type="text" id="addImg" placeholder="Image URL" class="search-input" style="width:100%">
            <select id="addType" class="search-input" style="width:100%"><option value="SWORD">SWORD</option><option value="ACCESSORY">ACCESSORY</option></select>
            <input type="number" id="addVal" placeholder="Value" required class="search-input" style="width:100%">
            <button type="submit" class="btn" style="background:var(--accent); color:white;">SAVE ITEM</button>
        </form>
    </div>

    <div class="grid" id="itemGrid"></div>

    <script>
        // --- THE DATABASE ---
        const sailorItems = [
            { id: 1, name: "Atomic (with sigil)", type: "SWORD", value: 1086, img: "https://sailor-piece.vaultedvaluesx.com/_next/image?url=https%3A%2F%2Fcdn.discordapp.com%2Fattachments%2F1223395995403063467%2F1224719266710978600%2FAtomic_Sigil.png&w=256&q=75" },
            { id: 2, name: "Ragna Set", type: "ACCESSORY", value: 1650000, img: "https://sailor-piece.vaultedvaluesx.com/_next/image?url=https%3A%2F%2Fcdn.discordapp.com%2Fattachments%2F1223395995403063467%2F1224720188602224710%2FRagna_Set.png&w=256&q=75" },
            { id: 3, name: "Saber v2 (Set)", type: "SWORD", value: 2184, img: "https://sailor-piece.vaultedvaluesx.com/_next/image?url=https%3A%2F%2Fcdn.discordapp.com%2Fattachments%2F1223395995403063467%2F1224719463935541248%2FSaber_v2.png&w=256&q=75" },
            { id: 4, name: "Madoka Set", type: "ACCESSORY", value: 835000, img: "https://sailor-piece.vaultedvaluesx.com/_next/image?url=https%3A%2F%2Fcdn.discordapp.com%2Fattachments%2F1223395995403063467%2F1224720111166984252%2FMadoka_Set.png&w=256&q=75" },
            { id: 5, name: "Kokushibo (Set)", type: "SWORD", value: 2092, img: "https://sailor-piece.vaultedvaluesx.com/_next/image?url=https%3A%2F%2Fcdn.discordapp.com%2Fattachments%2F1223395995403063467%2F1224719363071352862%2FKokushibo.png&w=256&q=75" },
            { id: 6, name: "Madara Set", type: "ACCESSORY", value: 2050, img: "https://sailor-piece.vaultedvaluesx.com/_next/image?url=https%3A%2F%2Fcdn.discordapp.com%2Fattachments%2F1223395995403063467%2F1224719416552914944%2FMadara.png&w=256&q=75" }
        ];

        let db = JSON.parse(localStorage.getItem('boopaFinalDB')) || sailorItems;
        let activeFilter = 'ALL';

        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function showLogin() {
            if(prompt("Admin Password:") === "BOOPA_OWNER_2026") {
                sessionStorage.setItem('isAdmin', 'true');
                document.getElementById('adminPanel').style.display = 'block';
                render();
            }
        }

        function render() {
            const grid = document.getElementById('itemGrid');
            const search = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';

            const filtered = db.filter(i => {
                const f = activeFilter === 'ALL' || i.type === activeFilter;
                const s = i.name.toLowerCase().includes(search);
                return f && s;
            });

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="item-img" style="background-image: url('${item.img}')"></div>
                    <div class="content">
                        <span class="category-tag">${item.type}</span>
                        <h2 style="margin-bottom:10px;">${item.name}</h2>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <p style="font-size:10px; color:var(--text-dim);">VALUE</p>
                                <p class="val">${item.value.toLocaleString()}</p>
                            </div>
                            ${sessionStorage.getItem('isAdmin') ? `<button onclick="del(${item.id})" style="color:red; background:none; border:none; cursor:pointer; font-size:10px;">Remove</button>` : ''}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function setFilter(f, btn) {
            activeFilter = f;
            document.querySelectorAll('.filter-btns .btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        window.del = (id) => {
            db = db.filter(i => i.id !== id);
            localStorage.setItem('boopaFinalDB', JSON.stringify(db));
            render();
        };

        document.getElementById('addForm').onsubmit = (e) => {
            e.preventDefault();
            db.push({
                id: Date.now(),
                name: document.getElementById('addName').value,
                img: document.getElementById('addImg').value,
                type: document.getElementById('addType').value,
                value: parseInt(document.getElementById('addVal').value)
            });
            localStorage.setItem('boopaFinalDB', JSON.stringify(db));
            render();
            e.target.reset();
        };

        document.getElementById('search').oninput = render;
        render();
    </script>
</body>
</html>
