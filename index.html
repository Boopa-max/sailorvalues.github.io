<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body x-data="{ items: {}, update: '', tab: 'Fruits' }" x-init="fetch('./data.json').then(r => r.json()).then(d => { items = d.categories; update = d.last_updated })">
    <div class="max-w-5xl mx-auto py-10 px-5">
        <h1 class="text-4xl font-black text-cyan-400 mb-2">SAILOR PIECE VALUES</h1>
        <p class="text-gray-500 mb-8">Update: <span x-text="update"></span></p>

        <div class="flex gap-4 mb-8">
            <template x-for="t in ['Fruits', 'Gamepass', 'Items']">
                <button @click="tab = t" :class="tab == t ? 'bg-cyan-500' : 'bg-gray-800'" class="px-6 py-2 rounded-full font-bold" x-text="t"></button>
            </template>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <template x-for="item in items[tab]">
                <div class="glass p-6 rounded-3xl flex justify-between items-center">
                    <span class="text-xl font-bold" x-text="item.name"></span>
                    <span class="text-cyan-400 font-mono text-xl" x-text="item.value"></span>
                </div>
            </template>
        </div>
    </div>
</body>
</html>
