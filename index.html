<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sailor Piece Values | Professional Trading Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --card: #141417; --accent: #3b82f6; --border: #27272a; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; }
        .sidebar { background: #000; border-right: 1px solid var(--border); height: 100vh; position: fixed; width: 260px; z-index: 50; }
        .content { margin-left: 260px; padding: 2rem; }
        .value-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: 0.2s; }
        .value-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .rarity-label { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        .Mythical { color: #ff4785; background: rgba(255, 71, 133, 0.1); }
        .Secret { color: #a855f7; background: rgba(168, 85, 247, 0.1); }
        .Legendary { color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        .Epic { color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .content { margin-left: 0; padding: 1rem; }
        }
    </style>
</head>
<body>

    <aside class="sidebar p-6 hidden md:block">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-black italic text-xl">S</div>
            <h1 class="font-extrabold text-xl tracking-tighter">SAILOR<br><span class="text-blue-500">VALUES</span></h1>
        </div>
        <nav class="space-y-2">
            <button onclick="filterType('all')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-white/5 font-semibold text-sm">🏠 Home</button>
            <button onclick="filterType('Weapon')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-white/5 font-semibold text-sm">⚔️ Weapons</button>
            <button onclick="filterType('Accessory')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-white/5 font-semibold text-sm">🧥 Accessories</button>
            <button onclick="filterType('Fruit')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-white/5 font-semibold text-sm">🍍 Devil Fruits</button>
            <button onclick="filterType('Material')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-white/5 font-semibold text-sm">📦 Materials</button>
        </nav>
    </aside>

    <main class="content">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h2 class="text-3xl font-black italic">MARKET VALUES</h2>
                <p class="text-gray-500 text-sm">Last Update: April 18, 2026 (Infinite Tower Meta)</p>
            </div>
            <input type="text" id="search" onkeyup="search()" placeholder="Search items..." class="bg-white/5 border border-white/10 rounded-xl px-6 py-3 w-full md:w-96 outline-none focus:border-blue-500">
        </header>

        <div id="item-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <script>
        const database = [
            // WEAPONS
            { name: "Atomic Sword", price: "1.2M - 1.5M", rarity: "Mythical", demand: "🔥 High", type: "Weapon", icon: "☢️" },
            { name: "Abyssal Empress", price: "1.1M - 1.3M", rarity: "Mythical", demand: "🔥 High", type: "Weapon", icon: "🔱" },
            { name: "Ice Queen Sword", price: "950K - 1.1M", rarity: "Mythical", demand: "Stable", type: "Weapon", icon: "❄️" },
            { name: "True Aizen", price: "800K", rarity: "Mythical", demand: "Stable", type: "Weapon", icon: "🌌" },
            { name: "Shadow Monarch", price: "750K", rarity: "Mythical", demand: "Medium", type: "Weapon", icon: "💀" },
            { name: "Yamato", price: "400K", rarity: "Mythical", demand: "Medium", type: "Weapon", icon: "⚔️" },
            { name: "Rimuru Sword", price: "350K", rarity: "Mythical", demand: "Low", type: "Weapon", icon: "💧" },

            // ACCESSORIES
            { name: "Ice Queen Outfit", price: "150 - 200", rarity: "Mythical", demand: "Medium", type: "Accessory", icon: "👑" },
            { name: "Moon Outfit", price: "60 - 85", rarity: "Mythical", demand: "Low", type: "Accessory", icon: "🌙" },
            { name: "Atomic Outfit", price: "40 - 55", rarity: "Mythical", demand: "Low", type: "Accessory", icon: "🥋" },
            { name: "Abyssal Outfit", price: "35 - 50", rarity: "Mythical", demand: "Low", type: "Accessory", icon: "🌑" },
            { name: "Manipulator Outfit", price: "25 - 35", rarity: "Mythical", demand: "Low", type: "Accessory", icon: "🎭" },
            { name: "Gojo Blindfold", price: "10 - 15", rarity: "Legendary", demand: "Very Low", type: "Accessory", icon: "👓" },

            // FRUITS
            { name: "Light Fruit", price: "20 - 25", rarity: "Legendary", demand: "High", type: "Fruit", icon: "☀️" },
            { name: "Quake Fruit", price: "10 - 15", rarity: "Epic", demand: "Medium", type: "Fruit", icon: "🫨" },
            { name: "Flame Fruit", price: "4 - 6", rarity: "Rare", demand: "Low", type: "Fruit", icon: "🔥" },

            // MATERIALS / CURRENCY
            { name: "Aura Crate", price: "450 - 500", rarity: "Secret", demand: "📈 Extreme", type: "Material", icon: "✨" },
            { name: "Secret Chest", price: "3,000", rarity: "Secret", demand: "High", type: "Material", icon: "🎁" },
            { name: "Mythical Chest", price: "950", rarity: "Mythical", demand: "Stable", type: "Material", icon: "📦" },
            { name: "Abyss Sigil", price: "6 - 8", rarity: "Legendary", demand: "High", type: "Material", icon: "🌀" },
            { name: "Evolution Fragment", price: "1,200", rarity: "Legendary", demand: "Stable", type: "Material", icon: "💎" }
        ];

        function render(data) {
            const grid = document.getElementById('item-grid');
            grid.innerHTML = data.map(item => `
                <div class="value-card">
                    <div class="p-4 border-b border-white/5 flex justify-between items-center">
                        <span class="rarity-label ${item.rarity}">${item.rarity}</span>
                        <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">${item.type}</span>
                    </div>
                    <div class="p-6 text-center">
                        <div class="text-5xl mb-4 drop-shadow-lg">${item.icon}</div>
                        <h3 class="font-bold text-lg mb-1">${item.name}</h3>
                        <p class="text-blue-500 font-black mono text-xl">${item.price}</p>
                        <p class="text-[10px] text-gray-400 mt-1 uppercase font-bold tracking-tighter">Value in Clan Rerolls (CR)</p>
                    </div>
                    <div class="bg-white/5 p-3 px-6 flex justify-between items-center">
                        <span class="text-[10px] text-gray-500 font-bold">DEMAND</span>
                        <span class="text-[10px] font-black ${item.demand.includes('High') ? 'text-red-500' : 'text-green-500'}">${item.demand}</span>
                    </div>
                </div>
            `).join('');
        }

        function search() {
            const q = document.getElementById('search').value.toLowerCase();
            render(database.filter(i => i.name.toLowerCase().includes(q)));
        }

        function filterType(type) {
            if(type === 'all') return render(database);
            render(database.filter(i => i.type === type));
        }

        render(database);
    </script>
</body>
</html>
