<!DOCTYPE html>
<html>
<head>
    <title>Test Sailor Values</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-zinc-950 text-white p-10">

    <div x-data="{ data: null, error: false }" x-init="fetch('./data.json').then(r => r.json()).then(res => data = res).catch(e => error = true)">
        
        <h1 class="text-3xl font-bold text-cyan-400 mb-5">SAILOR VALUES CHECK</h1>

        <template x-if="error">
            <div class="bg-red-500 p-4 rounded">Error: File data.json tidak ditemukan atau rusak!</div>
        </template>

        <template x-if="!data && !error">
            <p>Sedang memuat data... Mohon tunggu...</p>
        </template>

        <template x-if="data">
            <div>
                <p class="mb-5 text-gray-400">Update Terakhir: <span x-text="data.last_updated"></span></p>
                
                <div class="grid gap-4">
                    <template x-for="(items, category) in data.categories">
                        <div class="border border-zinc-800 p-4 rounded">
                            <h2 class="text-xl font-bold text-yellow-500 mb-3" x-text="category"></h2>
                            <div class="grid gap-2">
                                <template x-for="item in items">
                                    <div class="flex justify-between bg-zinc-900 p-3 rounded">
                                        <span x-text="item.name"></span>
                                        <span class="text-cyan-400 font-mono" x-text="item.value"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

    </div>
</body>
</html>
