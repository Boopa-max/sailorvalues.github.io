<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Name | Sailor Piece Values</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d24;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #2dd4bf;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            /* Optimized for 1366x768 screens */
            max-width: 1366px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #818cf8, #2dd4bf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            padding: 2rem;
            flex: 1;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        input[type="text"] {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: var(--card-bg);
            color: var(--text-main);
            width: 300px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        .filters {
            display: flex;
            gap: 0.5rem;
        }

        button {
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            border: none;
            background-color: var(--card-bg);
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            color: var(--text-main);
            background-color: #334155;
        }

        button.active {
            background-color: var(--accent);
            color: #fff;
        }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .item-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .item-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-color: var(--accent);
        }

        .item-type {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--border);
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .item-name {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .item-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .stat-label {
            color: var(--text-muted);
        }

        .stat-value {
            font-weight: 600;
            color: #fff;
        }

        .value-high {
            color: #fbbf24;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">YOUR COMPANY</div>
        <div style="font-size: 0.875rem; color: var(--text-muted);">Sailor Piece Market DB</div>
    </header>

    <main>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search items...">
            <div class="filters">
                <button class="active" data-filter="ALL">All Items</button>
                <button data-filter="ITEMS.ACCESSORY">Accessories</button>
                <button data-filter="MELEE.SWORD">Swords</button>
            </div>
        </div>

        <div class="item-grid" id="itemGrid">
            </div>
    </main>

    <script>
        // Data structure. You can easily expand this list with the remaining 180+ items from the value list.
        const itemsData = [
            { name: "Ragna Set", type: "ITEMS.ACCESSORY", value: "1.65M", demand: "High - 10" },
            { name: "Madoka Set", type: "ITEMS.ACCESSORY", value: "825K - 850K", demand: "High - 9" },
            { name: "Atomic (with sigil)", type: "MELEE.SWORD", value: "1,086", demand: "Moderate - 8" },
            { name: "Kokushibo", type: "MELEE.SWORD", value: "2,092", demand: "Medium - 3" },
            { name: "Saber v2", type: "MELEE.SWORD", value: "2,184", demand: "Medium - 1" },
            { name: "Esdeath", type: "ITEMS.ACCESSORY", value: "2,230", demand: "Medium - 3" }
        ];

        const itemGrid = document.getElementById('itemGrid');
        const searchInput = document.getElementById('searchInput');
        const filterButtons = document.querySelectorAll('.filters button');

        let currentFilter = 'ALL';
        let searchQuery = '';

        function renderItems() {
            itemGrid.innerHTML = '';
            
            const filtered = itemsData.filter(item => {
                const matchesFilter = currentFilter === 'ALL' || item.type === currentFilter;
                const matchesSearch = item.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesFilter && matchesSearch;
            });

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <span class="item-type">${item.type.replace('.', ' ')}</span>
                    <div class="item-name">${item.name}</div>
                    <div class="item-stats">
                        <div>
                            <div class="stat-label">CRR Value</div>
                            <div class="stat-value value-high">${item.value}</div>
                        </div>
                        <div style="text-align: right;">
                            <div class="stat-label">Demand</div>
                            <div class="stat-value">${item.demand}</div>
                        </div>
                    </div>
                `;
                itemGrid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderItems();
        });

        filterButtons.forEach(button => {
            button.addEventListener('click', () => {
                filterButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                currentFilter = button.getAttribute('data-filter');
                renderItems();
            });
        });

        // Initial Render
        renderItems();
    </script>
</body>
</html>
